version: '3.8'

services:
  postgres:
    image: postgres:15.10-alpine
    container_name: gerenciador-pessoal-db
    environment:
      POSTGRES_DB: gerenciador_pessoal
      POSTGRES_USER: gerenciador
      POSTGRES_PASSWORD: gerenciador123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gerenciador-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gerenciador"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  gerenciador-network:
    driver: bridge
