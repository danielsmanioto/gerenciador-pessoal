name: Code Review Agent

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: ["main"]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Número do PR para revisão"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-code-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Executar agente de code review
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.3-codex' }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const core = require('@actions/core');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request?.number || Number(process.env.INPUT_PR_NUMBER);

            if (!prNumber) {
              core.setFailed('PR não identificado. Em workflow_dispatch, informe pr_number.');
              return;
            }

            if (!process.env.OPENAI_API_KEY) {
              core.setFailed('Secret OPENAI_API_KEY não configurado no repositório.');
              return;
            }

            const agentPrompt = fs.readFileSync('.github/agents/code-review-agent.md', 'utf8');

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const changed = files.map(f =>
              `Arquivo: ${f.filename}\nStatus: ${f.status}\nPatch:\n${f.patch || '[sem patch: binário/grande demais]'}`
            ).join('\n\n---\n\n');

            const diffForReview = changed.slice(0, 120000);

            const input = [
              {
                role: 'system',
                content: [
                  {
                    type: 'text',
                    text: 'Você é um revisor técnico sênior. Responda em português do Brasil. Seja objetivo, com severidade, evidências e recomendações acionáveis.'
                  }
                ]
              },
              {
                role: 'user',
                content: [
                  {
                    type: 'text',
                    text: `${agentPrompt}\n\n### Diff do PR #${prNumber}\n\n${diffForReview}`
                  }
                ]
              }
            ];

            const response = await fetch('https://api.openai.com/v1/responses', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: process.env.OPENAI_MODEL || 'gpt-5.3-codex',
                input,
                max_output_tokens: 2500,
                temperature: 0.2
              })
            });

            if (!response.ok) {
              const err = await response.text();
              core.setFailed(`Falha na chamada do modelo: ${response.status} - ${err}`);
              return;
            }

            const data = await response.json();
            const reviewText = data.output_text || 'Não foi possível extrair resposta do modelo.';

            const comment = [
              '## 🤖 Code Review Agent',
              `PR analisado: #${prNumber}`,
              '',
              reviewText,
              '',
              '_Gerado automaticamente por workflow usando .github/agents/code-review-agent.md_'
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: comment.slice(0, 65000)
            });

            core.info('Review publicado com sucesso no PR.');
